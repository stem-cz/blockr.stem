# Build & deploy the pkgdown site against the PINNED blockr stack (rv), so the
# docs match the versions the package is actually developed against.
on:
  push:
    branches: [main, master]
  pull_request:
  release:
    types: [published]
  workflow_dispatch:

name: pkgdown.yaml

permissions: read-all

jobs:
  pkgdown:
    runs-on: ubuntu-latest
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          # Must match `r_version` in rproject.toml so rv resolves the locked stack.
          r-version: '4.6'

      - name: Install rv
        uses: a2-ai/setup-rv@v1.0.0

      - name: Install pinned dependencies (exactly rv.lock)
        run: rv sync --locked

      - name: Build site
        # install = FALSE: pkgdown loads blockr.stem from source (pkgload) against
        # the rv library. rv run puts that library on the search path.
        run: rv run --no-sync -e 'pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)'

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
